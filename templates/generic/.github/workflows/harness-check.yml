name: Harness Check

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

jobs:
  harness-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check document drift
        run: python scripts/check_docs_drift.py

      - name: Check structure drift
        run: python scripts/check_structure.py

      - name: Check effectiveness measurement reports
        run: python scripts/check_effectiveness_plan.py

      - name: Check decision memory review
        if: ${{ github.event_name == 'pull_request' }}
        run: python scripts/check_decision_memory.py --base "${{ github.event.pull_request.base.sha }}"

      - name: Check decision memory review local smoke
        if: ${{ github.event_name != 'pull_request' }}
        run: python scripts/check_decision_memory.py
